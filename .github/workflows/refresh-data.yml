name: Refresh Dashboard Data

on:
  schedule:
    # Runs every 6 hours at :17 past the hour
    - cron: '17 */6 * * *'
  workflow_dispatch: # Allow manual trigger from GitHub Actions UI

jobs:
  refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run data refresh
        env:
          GA4_CREDENTIALS_JSON: ${{ secrets.GA4_CREDENTIALS_JSON }}
          GA4_PROPERTY_ID: ${{ secrets.GA4_PROPERTY_ID }}
          AMPLITUDE_API_KEY: ${{ secrets.AMPLITUDE_API_KEY }}
          AMPLITUDE_SECRET_KEY: ${{ secrets.AMPLITUDE_SECRET_KEY }}
          AIROPS_API_KEY: ${{ secrets.AIROPS_API_KEY }}
          AIROPS_WORKSPACE_ID: ${{ secrets.AIROPS_WORKSPACE_ID }}
        run: python scripts/refresh_data.py

      - name: Commit and push if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard-data.json
          if git diff --cached --quiet; then
            echo "No data changes detected"
          else
            git commit -m "chore: auto-refresh dashboard data $(date -u +'%Y-%m-%d %H:%M UTC')"
            git push
          fi
